<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>arq — AI Tutor for First-Year University Students</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Instrument+Serif:ital,wght@0,400;0,900;1,400;1,900&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- KaTeX for formula rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #262624;
      --surface:     #30302e;
      --brand:       #d97757;
      --brand-hover: #e8896b;
      --text-1:      #f0ede8;
      --text-2:      rgba(240, 237, 232, 0.55);
      --text-muted:  rgba(240, 237, 232, 0.38);
      --border:      rgba(255,255,255,0.07);
      --border-2:    rgba(255,255,255,0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Geist', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Formula canvas layer ── */
    #formula-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      user-select: none;
      z-index: 0;
      overflow: hidden;
    }

    .f-node {
      position: absolute;
      color: var(--text-1);
      opacity: 0;
      transition: opacity 1.2s ease;
      white-space: nowrap;
    }

    .f-node.visible {
      opacity: 1;
    }

    /* KaTeX inside formula nodes */
    .f-node .katex {
      font-size: inherit;
      color: inherit;
    }

    /* ── Hero ── */
    .hero {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px 80px;
      position: relative;
      z-index: 1;
    }

    .hero-inner {
      max-width: 640px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeUp 0.7s ease both;
    }

    /* Heading */
    .hero-heading {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2.8rem, 8vw, 4.4rem);
      font-weight: 900;
      line-height: 1.15;
      color: var(--text-1);
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }

    .hero-heading .highlight {
      font-style: italic;
      color: var(--brand);
    }



    /* Subheading */
    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.125rem);
      font-weight: 400;
      color: var(--text-2);
      line-height: 1.7;
      max-width: 500px;
      margin-bottom: 16px;
    }

    /* Trust line */
    .hero-trust {
      font-size: 0.8125rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 44px;
    }

    /* CTA Button */
    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--brand);
      color: #fff;
      border: none;
      font-family: 'Geist', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      padding: 14px 34px;
      border-radius: 999px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -0.01em;
    }

    .hero-cta:hover {
      background: var(--brand-hover);
      transform: translateY(-1px);
    }

    .hero-cta:active { transform: scale(0.97); }

    .hero-cta svg {
      width: 16px;
      height: 16px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Divider */
    .hero-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-2), transparent);
    }

    /* Animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: none; }
    }

    @media (max-width: 480px) {
      .hero { padding: 48px 20px 64px; }
      .hero-heading { font-size: 1.85rem; }
    }
  </style>
</head>
<body>

  <!-- Scattered formula background -->
  <div id="formula-layer" aria-hidden="true"></div>

  <section class="hero">
    <div class="hero-inner">

      <!-- Heading -->
      <h1 class="hero-heading">
        Your AI tutor for<br><span class="highlight">first-year students</span>
      </h1>

      <!-- Subheading -->
      <p class="hero-sub">
        Understand difficult concepts in maths, physics, statistics, computing, and academic writing — explained step by step, the way a lecturer would.
      </p>

      <!-- Trust line -->
      <p class="hero-trust">Concept explanation &amp; assignment help</p>

      <!-- CTA -->
      <a href="/app" class="hero-cta" id="cta-start">
        Start Learning
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>

    </div>
  </section>

  <div class="hero-divider"></div>

  <script>
    // Track CTA click
    document.getElementById('cta-start').addEventListener('click', () => {
      posthog.capture('cta_clicked', { cta: 'start_learning', page: 'landing' });
    });
  </script>

  <script>
    // Wait for KaTeX to load, then scatter formulas
    window.addEventListener('load', () => {
      if (typeof katex === 'undefined') return;

      const formulas = [
        // Algebra & Calculus
        { tex: 'x = \\dfrac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}',         size: 1.05 },
        { tex: '\\dfrac{d}{dx}\\left[f(g(x))\\right] = f\'(g(x))\\,g\'(x)', size: 0.88 },
        { tex: '\\int_a^b f(x)\\,dx = F(b) - F(a)',                   size: 0.92 },
        { tex: 'e^{i\\pi} + 1 = 0',                                   size: 1.7  },
        { tex: '\\sum_{n=0}^{\\infty} \\frac{x^n}{n!} = e^x',        size: 1.4  },
        { tex: '\\nabla^2 \\phi = 0',                                 size: 1.6  },
        { tex: '\\frac{\\partial f}{\\partial x} = \\lim_{h \\to 0}\\frac{f(x+h)-f(x)}{h}', size: 1.2 },
        { tex: '\\det(A) = \\sum_{j=1}^n a_{ij}\\,C_{ij}',           size: 1.3  },
        { tex: 'A\\mathbf{x} = \\lambda\\mathbf{x}',                  size: 1.55 },
        { tex: '\\int_0^\\infty e^{-x^2}dx = \\dfrac{\\sqrt{\\pi}}{2}', size: 1.4 },
        { tex: 'f(x) = \\sum_{n=0}^{\\infty}\\frac{f^{(n)}(a)}{n!}(x-a)^n', size: 1.25 },
        { tex: '\\nabla \\times \\mathbf{F} = \\left(\\frac{\\partial F_z}{\\partial y} - \\frac{\\partial F_y}{\\partial z}\\right)\\hat{i}', size: 1.1 },

        // Physics
        { tex: 'E = mc^2',                                            size: 1.9  },
        { tex: 'F = ma',                                              size: 1.7  },
        { tex: '\\mathbf{F} = q(\\mathbf{E} + \\mathbf{v} \\times \\mathbf{B})', size: 1.35 },
        { tex: '\\hbar\\,\\frac{\\partial \\Psi}{\\partial t} = \\hat{H}\\Psi', size: 1.3 },
        { tex: '\\Delta x \\, \\Delta p \\geq \\dfrac{\\hbar}{2}',    size: 1.45 },
        { tex: 'S = k_B \\ln \\Omega',                                size: 1.55 },
        { tex: 'PV = nRT',                                            size: 1.6  },
        { tex: '\\oint \\mathbf{E} \\cdot d\\mathbf{A} = \\dfrac{Q}{\\varepsilon_0}', size: 1.3 },
        { tex: 'c = \\lambda f',                                      size: 1.55 },
        { tex: 'T = 2\\pi\\sqrt{\\dfrac{L}{g}}',                      size: 1.45 },
        { tex: 'F = \\frac{Gm_1 m_2}{r^2}',                          size: 1.4  },

        // Statistics
        { tex: 'P(A|B) = \\dfrac{P(B|A)\\,P(A)}{P(B)}',              size: 1.35 },
        { tex: '\\bar{x} = \\dfrac{1}{n}\\sum_{i=1}^n x_i',          size: 1.4  },
        { tex: '\\sigma^2 = \\frac{1}{N}\\sum_{i=1}^N (x_i - \\mu)^2', size: 1.25 },
      ];

      const layer = document.getElementById('formula-layer');
      const W = window.innerWidth;
      const H = window.innerHeight;

      // Grid-based scatter — reduced to 3x4 = 12 formulas
      const cols = 3;
      const rows = 4;
      const cellW = W / cols;
      const cellH = H / rows;

      // Shuffle formulas
      const shuffled = [...formulas].sort(() => Math.random() - 0.5);
      const used = shuffled.slice(0, cols * rows);

      used.forEach((item, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);

        // Random position within cell, with padding
        const pad = 40;
        const x = col * cellW + pad + Math.random() * (cellW - pad * 2);
        const y = row * cellH + pad + Math.random() * (cellH - pad * 2);

        // Random slight rotation
        const rot = (Math.random() - 0.5) * 14;

        // Opacity tier — formulas near center are slightly more faded
        const cx = Math.abs(x - W / 2) / (W / 2);
        const cy = Math.abs(y - H / 2) / (H / 2);
        const distFromCenter = Math.sqrt(cx * cx + cy * cy);
        const opacity = 0.028 + distFromCenter * 0.038;

        const node = document.createElement('div');
        node.className = 'f-node';
        node.style.cssText = `
          left: ${x}px;
          top: ${y}px;
          font-size: ${item.size}rem;
          opacity: 0;
          transform: translate(-50%, -50%) rotate(${rot}deg);
        `;

        try {
          katex.render(item.tex, node, { throwOnError: false, displayMode: false });
        } catch(e) {
          node.textContent = item.tex;
        }

        // Override KaTeX color
        node.style.color = `rgba(240, 237, 232, 1)`;

        layer.appendChild(node);

        // Staggered fade-in
        setTimeout(() => {
          node.style.transition = 'opacity 1.6s ease';
          node.style.opacity = String(opacity);
        }, 200 + i * 60);
      });
    });
  </script>

</body>
</html>
